<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Our Lady's Legion</title>
        <link rel="icon" href="/OLLSheild.svg" type="/image/svg+xml" />
        <link rel="stylesheet" href="/style.css" />
        <link rel="preload" href="/navBar.html" as="fetch" type="text/html" crossorigin />
        <link rel="preload" href="/navBar.js" as="fetch" type="application/javascript" crossorigin />
        <link rel="preload" href="/navLinks.html" as="fetch" type="text/html" crossorigin />
        <link rel="preload" href="/footer.html" as="fetch" type="text/html" crossorigin />
        <script src="/peerjs.min.js"></script>
    </head>
    <body>
        <div data-template="/navBar.html" data-template-script="/navBar.js" data-template-replace="true"></div>
        <div id="main">
            <div id="CATClientOptions">
                <label for="CATUsername">Username: </label>
                <input id="CATUsername" class="CAT" type="text" value="Anonymous" placeholder="Enter Username Here" oninput="clientConfig.name = this.value">
                <hr>
                <div id="CATServerList" class="CAT">
                    <h2>Server List: </h2>
                </div>
                <br>
                <input id="CATServerListReload" class="CAT" type="button" value="Reload Server List">
                <hr>
                <input id="CATToggleOptionsBtn0" class="CAT" type="button" value="Toggle Client/Server Options">
            </div>
            <div id="CATServerOptions" style="display:none;">
                <label for="CATServerName">Server Name: </label>
                <input id="CATServerName" class="CAT" type="text" value="CAT Server" oninput="serverConfig.name = this.value">
                <br><br>
                <input id="CATRunServerBtn" class="CAT" type="button" value="Run Server" onclick="runServer()">
                <hr>
                <input id="CATToggleOptionsBtn1" class="CAT" type="button" value="Toggle Client/Server Options">
            </div>
            <div id="CATClient" style="display:none;">
                <div id="CATMessageOutput" style="flex-grow: 1;"></div>
                <div id="CATInputContainer">
                    <input id="CATMessageInput" class="CAT" type="text" placeholder="Enter Message Here" style="flex-grow: 9;" autofocus>
                    <input id="CATMessageSubmit" class="CAT" type="button" value="Submit" style="flex-grow: 1;">
                </div>
                <div id="CATNavContainer">
                    <input id="CATBackBtn" class="CAT" type="button" value="Back">
                </div>
            </div>
        </div>
        <!--<div data-template="/footer.html" data-template-replace="true"></div></div>-->
        <script src="/HTMLTemplates.js"></script>
        <script src="/CAT.js"></script>
    </body>
</html>
